<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfect Pitch Trainer</title>
  <script src="https://unpkg.com/tone"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      font-family: sans-serif;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
    }

    .play-btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      cursor: pointer;
      margin-bottom: 32px;
    }

    .play-btn:hover {
      opacity: 0.9;
    }

    .piano {
      position: relative;
      width: 350px;
      height: 140px;
      margin: 0 auto;
    }

    .white-keys {
      display: flex;
      position: absolute;
      z-index: 1;
    }

    .white {
      width: 50px;
      height: 140px;
      background: white;
      border: 2px solid #333;
      box-sizing: border-box;
      border-radius: 0 0 10px 10px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 10px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    .white:active {
      background: #ddd;
    }

    .black {
      position: absolute;
      width: 34px;
      height: 80px;
      background: #222;
      color: white;
      border-radius: 0 0 8px 8px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      z-index: 2;
    }

    .black:active {
      background: #555;
    }

    .result {
      margin-top: 28px;
      font-size: 22px;
      font-weight: bold;
      min-height: 32px;
    }

    .score {
      margin-top: 10px;
      color: #555;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Perfect Pitch Trainer</h1>

    <button class="play-btn" onclick="playRandomNote()">
      ▶ Play Note
    </button>
	
	<button class="play-btn" onclick="replayNote()">
      ↻ Replay
    </button>
	
	<div style="margin-bottom: 20px;">
      <button onclick="setMode(false)">White Keys Only</button>
      <button onclick="setMode(true)">All Notes</button>
    </div>

    <div style="margin-bottom: 20px;">
      <button onclick="setRange(48, 59)">
        Low
      </button>

      <button onclick="setRange(60, 71)">
        Mid
      </button>

      <button onclick="setRange(72, 96)">
        High
      </button>

      <button onclick="setRange(48, 96)">
        Full
      </button>
    </div>
	
	<div class="piano">

      <!-- White Keys -->
      <div class="white-keys">
        <div class="white" onclick="guess('C')">C</div>
        <div class="white" onclick="guess('D')">D</div>
        <div class="white" onclick="guess('E')">E</div>
        <div class="white" onclick="guess('F')">F</div>
        <div class="white" onclick="guess('G')">G</div>
        <div class="white" onclick="guess('A')">A</div>
        <div class="white" onclick="guess('B')">B</div>
      </div>

      <!-- Black Keys -->
      <div class="black black-key" style="left: 34px;" onclick="guess('C#')">C#</div>
      <div class="black black-key" style="left: 84px;" onclick="guess('D#')">D#</div>

      <div class="black black-key" style="left: 184px;" onclick="guess('F#')">F#</div>
      <div class="black black-key" style="left: 234px;" onclick="guess('G#')">G#</div>
      <div class="black black-key" style="left: 284px;" onclick="guess('A#')">A#</div>
    </div>

    <div class="result" id="result"></div>
    <div class="score" id="score">Correct: 0 / 0</div>
  </div>

  <script>
    const noteNames = [
      "C", "C#", "D", "D#", "E",
      "F", "F#", "G", "G#", "A", "A#", "B"
    ];

    const sampler = new Tone.Sampler({
  urls: {
    A0: "A0.mp3",
    C1: "C1.mp3",
    "D#1": "Ds1.mp3",
    "F#1": "Fs1.mp3",
    A1: "A1.mp3",
    C2: "C2.mp3",
    "D#2": "Ds2.mp3",
    "F#2": "Fs2.mp3",
    A2: "A2.mp3",
    C3: "C3.mp3",
    "D#3": "Ds3.mp3",
    "F#3": "Fs3.mp3",
    A3: "A3.mp3",
    C4: "C4.mp3",
    "D#4": "Ds4.mp3",
    "F#4": "Fs4.mp3",
    A4: "A4.mp3",
    C5: "C5.mp3",
    "D#5": "Ds5.mp3",
    "F#5": "Fs5.mp3",
    A5: "A5.mp3",
    C6: "C6.mp3",
    "D#6": "Ds6.mp3",
    "F#6": "Fs6.mp3",
    A6: "A6.mp3",
    C7: "C7.mp3",
    A7: "A7.mp3",
    C8: "C8.mp3"
  },

  release: 1,
  baseUrl: "https://tonejs.github.io/audio/salamander/"
}).toDestination();

    let currentAnswer = "";
	let currentNote = "";
	let includeBlackKeys = true;
	let minMidi = 48; // C3
    let maxMidi = 96; // C7
    let total = 0;
    let correct = 0;

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function playNote(noteName) {
      sampler.triggerAttackRelease(noteName, 2);
    }
    function playRandomNote() {
      document.getElementById("result").textContent = "";

      // C3(48) ～ C7(96)
      let midi;
      let noteIndex;

      while (true) {
        midi = Math.floor(
          Math.random() * (maxMidi - minMidi + 1)
        ) + minMidi;

        noteIndex = midi % 12;

        // 白鍵だけモード
        if (!includeBlackKeys) {
          if ([0, 2, 4, 5, 7, 9, 11].includes(noteIndex)) {
            break;
          }
        } else {
          break;
        }
      }
      currentAnswer = noteNames[noteIndex];

      const octave = Math.floor(midi / 12) - 1;
      const note = noteNames[noteIndex] + octave;

      currentNote = note;

      playNote(note);
    }
	
    function setMode(value) {
      includeBlackKeys = value;

      const result = document.getElementById("result");

      const blackKeys = document.querySelectorAll(".black-key");

      if (includeBlackKeys) {
        result.textContent = "Mode: All Notes";

        blackKeys.forEach(key => {
          key.style.opacity = "1";
          key.style.pointerEvents = "auto";
        });

      } else {
        result.textContent = "Mode: White Keys Only";

        blackKeys.forEach(key => {
          key.style.opacity = "0.2";
          key.style.pointerEvents = "none";
        });
      }

      result.style.color = "#333";
    }

    function setRange(min, max) {
      minMidi = min;
      maxMidi = max;

      const result = document.getElementById("result");

      if (min === 48 && max === 59) {
        result.textContent = "Range: Low";
      }
      else if (min === 60 && max === 71) {
        result.textContent = "Range: Mid";
      }
      else if (min === 72 && max === 96) {
        result.textContent = "Range: High";
      }
      else {
        result.textContent = "Range: Full";
      }

      result.style.color = "#333";
    }

    function guess(note) {
      total++;

      const result = document.getElementById("result");

      if (note === currentAnswer) {
        correct++;
        result.textContent = "Correct!";
        result.style.color = "#2e8b57";
      } else {
        result.textContent = `Wrong... Answer: ${currentAnswer}`;
        result.style.color = "#cc3333";
      }

      document.getElementById("score").textContent =
        `Correct: ${correct} / ${total}`;
    }
	function replayNote() {
      if (currentNote !== "") {
        playNote(currentNote);
      }
    }
  </script>
</body>
</html>
