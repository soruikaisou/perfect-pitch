<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfect Pitch Trainer</title>
  <script src="https://unpkg.com/tone"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      font-family: sans-serif;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
    }

    .play-btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      cursor: pointer;
      margin-bottom: 32px;
    }

    .play-btn:hover {
      opacity: 0.9;
    }

    .piano {
      position: relative;
      width: 350px;
      height: 140px;
      margin: 12px auto 0 auto;
    }

    .white-keys {
      display: flex;
      position: absolute;
      z-index: 1;
    }

    .white {
      width: 50px;
      height: 140px;
      background: white;
      border: 2px solid #333;
      box-sizing: border-box;
      border-radius: 0 0 10px 10px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 10px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    .white:active {
      background: #ddd;
    }

    .black {
      position: absolute;
      width: 34px;
      height: 80px;
      background: #222;
      color: white;
      border-radius: 0 0 8px 8px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      z-index: 2;
    }

    .black:active {
      background: #555;
    }

    .result {
      margin-top: 28px;
      font-size: 22px;
      font-weight: bold;
      min-height: 32px;
    }

    .score {
      margin-top: 10px;
      color: #555;
      font-size: 18px;
    }
	
    .settings-panel {
      position: fixed;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 300px;

      padding: 20px;

      border-radius: 16px;

      background: white;

      box-shadow: 0 4px 20px rgba(0,0,0,0.2);

      z-index: 1000;

      display: none;
    }
	
	.overlay {
      position: fixed;

      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background: rgba(0,0,0,0.4);

      z-index: 999;

      display: none;
    }
	
	.selected {
      background: white;
      border: 2px solid #222;
    }
  </style>
</head>

<body>

  <div id="overlay" class="overlay" onclick="toggleSettings()"></div>

  <div class="container">
    <h1>Perfect Pitch Trainer</h1>

    <button class="play-btn" onclick="playRandomNote()">
      ▶ Play Note
    </button>
	
	<button class="play-btn" onclick="replayNote()">
      ↻ Replay
    </button>
	
	<button onclick="toggleSettings()">
      ⚙ Settings
    </button>
	
	<div id="settings" class="settings-panel">

      <h3>Settings</h3>

      <label>Volume</label>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.8"
        onchange="setVolume(this.value)"
      >
	  
      <br><br>

      <label>Note Duration</label>

      <input
        type="range"
        min="0.3"
        max="3"
        step="0.1"
        value="2"
        onchange="setDuration(this.value)"
      >
	  
	  <br><br>

      <label>Reference C</label><br>

      <button class="reference-btn selected"
      onclick="setReference(false, this)">
        OFF
      </button>

      <button class="reference-btn"
      onclick="setReference(true, this)">
        ON
      </button>

      <br><br>

      <label>Note Mode</label><br>

      <button class="mode-btn selected"
      onclick="setMode(false, this)">
        White Only
      </button>

      <button class="mode-btn"
      onclick="setMode(true, this)">
        All Notes
      </button>

      <br><br>

      <label>Range</label><br>

      <button class="range-btn"
      onclick="setRange(48, 59, this)">
        Low
      </button>

      <button class="range-btn"
      onclick="setRange(60, 71, this)">
        Mid
      </button>

      <button class="range-btn"
      onclick="setRange(72, 96, this)">
        High
      </button>

      <button class="range-btn selected"
      onclick="setRange(48, 96, this)">
        Full
      </button>

      <br><br>

      <label>Notation</label><br>

      <button class="notation-btn selected"
      onclick="setNotation('english', this)">
        English
      </button>

      <button class="notation-btn"
      onclick="setNotation('german', this)">
        German
      </button>

      <button class="notation-btn"
      onclick="setNotation('italian', this)">
        Italian
      </button>
	  
	  <br><br>

      <label>Sound</label><br>

      <button class="sound-btn selected"
      onclick="setSound('piano', this)">
        Piano
      </button>

      <button class="sound-btn"
      onclick="setSound('sine', this)">
        Sine
      </button>
    </div>
	
	<div class="piano">

      <!-- White Keys -->
      <div class="white-keys">
        <div class="white" data-note="0" onclick="guess('C')">C</div>
        <div class="white" data-note="2" onclick="guess('D')">D</div>
        <div class="white" data-note="4" onclick="guess('E')">E</div>
        <div class="white" data-note="5" onclick="guess('F')">F</div>
        <div class="white" data-note="7" onclick="guess('G')">G</div>
        <div class="white" data-note="9" onclick="guess('A')">A</div>
        <div class="white" data-note="11" onclick="guess('B')">B</div>
      </div>

      <!-- Black Keys -->
      <div class="black black-key" data-note="1" style="left: 34px;" onclick="guess('C#')">C#</div>

      <div class="black black-key" data-note="3" style="left: 84px;" onclick="guess('D#')">D#</div>

      <div class="black black-key" data-note="6" style="left: 184px;" onclick="guess('F#')">F#</div>

      <div class="black black-key" data-note="8" style="left: 234px;" onclick="guess('G#')">G#</div>

      <div class="black black-key" data-note="10" style="left: 284px;" onclick="guess('A#')">A#</div>      
    </div>

    <div class="result" id="result"></div>
    <div class="score" id="score">Correct: 0 / 0</div>
  </div>

  <script>
    const noteNames = [
      "C", "C#", "D", "D#", "E",
      "F", "F#", "G", "G#", "A", "A#", "B"
    ];
	
	const noteLabels = {
      english: [
        "C","C#","D","D#","E",
        "F","F#","G","G#","A","A#","B"
      ],

      german: [
        "C","Cis","D","Dis","E",
        "F","Fis","G","Gis","A","Ais","H"
      ],

      italian: [
        "Do","Do#","Re","Re#","Mi",
        "Fa","Fa#","Sol","Sol#","La","La#","Si"
      ]
    };

    const sampler = new Tone.Sampler({
  urls: {
    A0: "A0.mp3",
    C1: "C1.mp3",
    "D#1": "Ds1.mp3",
    "F#1": "Fs1.mp3",
    A1: "A1.mp3",
    C2: "C2.mp3",
    "D#2": "Ds2.mp3",
    "F#2": "Fs2.mp3",
    A2: "A2.mp3",
    C3: "C3.mp3",
    "D#3": "Ds3.mp3",
    "F#3": "Fs3.mp3",
    A3: "A3.mp3",
    C4: "C4.mp3",
    "D#4": "Ds4.mp3",
    "F#4": "Fs4.mp3",
    A4: "A4.mp3",
    C5: "C5.mp3",
    "D#5": "Ds5.mp3",
    "F#5": "Fs5.mp3",
    A5: "A5.mp3",
    C6: "C6.mp3",
    "D#6": "Ds6.mp3",
    "F#6": "Fs6.mp3",
    A6: "A6.mp3",
    C7: "C7.mp3",
    A7: "A7.mp3",
    C8: "C8.mp3"
  },

  release: 1,
  baseUrl: "https://tonejs.github.io/audio/salamander/"
}).toDestination();

    let currentAnswer = "";
	let currentNote = "";
	let volume = 0.8;
	let noteDuration = 2;
	let playReferenceC = false;
	let notation = "english";
	let includeBlackKeys = true;
	let minMidi = 48; // C3
    let maxMidi = 96; // C7
    let total = 0;
    let correct = 0;
	let soundType = "piano";

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function playNote(noteName) {

      if (soundType === "piano") {

        sampler.volume.value =
          Tone.gainToDb(volume);

        sampler.triggerAttackRelease(
          noteName,
          noteDuration
        );

      } else if (soundType === "sine") {

        playSineNote(noteName);

      }
    }
	
	function playSineNote(noteName) {

      const frequency =
        Tone.Frequency(noteName).toFrequency();

      const synth = new Tone.Synth({
        oscillator: {
          type: "sine"
        }
      }).toDestination();

      synth.volume.value = Tone.gainToDb(volume);

      synth.triggerAttackRelease(
        frequency,
        noteDuration
      );
    }

    function playRandomNote() {
      document.getElementById("result").textContent = "";

      // C3(48) ～ C7(96)
      let midi;
      let noteIndex;

      while (true) {
        midi = Math.floor(
          Math.random() * (maxMidi - minMidi + 1)
        ) + minMidi;

        noteIndex = midi % 12;

        // 白鍵だけモード
        if (!includeBlackKeys) {
          if ([0, 2, 4, 5, 7, 9, 11].includes(noteIndex)) {
            break;
          }
        } else {
          break;
        }
      }
      currentAnswer = noteNames[noteIndex];

      const octave = Math.floor(midi / 12) - 1;
      const note = noteNames[noteIndex] + octave;

      currentNote = note;

      if (playReferenceC) {

      playNote("C4");

      setTimeout(() => {
        playNote(note);
      }, 1200);

    } else {

      playNote(note);
    }
    }
	
    function setMode(value, button) {
      includeBlackKeys = value;

      const result = document.getElementById("result");

      const blackKeys = document.querySelectorAll(".black-key");

      if (includeBlackKeys) {

        result.textContent = "Mode: All Notes";

        blackKeys.forEach(key => {
          key.style.opacity = "1";
          key.style.pointerEvents = "auto";
        });

      } else {

        result.textContent = "Mode: White Keys Only";

        blackKeys.forEach(key => {
          key.style.opacity = "0.2";
          key.style.pointerEvents = "none";
        });
      }

      result.style.color = "#333";

      // ボタン色切り替え
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");
    }

    function setRange(min, max, button) {

      minMidi = min;
      maxMidi = max;

      const result = document.getElementById("result");

      if (min === 48 && max === 59) {
       result.textContent = "Range: Low";
      }
      else if (min === 60 && max === 71) {
        result.textContent = "Range: Mid";
      }
      else if (min === 72 && max === 96) {
        result.textContent = "Range: High";
      }
      else {
        result.textContent = "Range: Full";
      }

      result.style.color = "#333";

      document.querySelectorAll(".range-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");
    }

    function guess(note) {
      total++;

      const result = document.getElementById("result");

      if (note === currentAnswer) {
        correct++;
        result.textContent = "Correct!";
        result.style.color = "#2e8b57";
      } else {
        result.textContent = `Wrong... Answer: ${currentAnswer}`;
        result.style.color = "#cc3333";
      }

      document.getElementById("score").textContent =
        `Correct: ${correct} / ${total}`;
    }
	
    function toggleSettings() {
      const panel = document.getElementById("settings");

      const overlay = document.getElementById("overlay");

      if (panel.style.display === "block") {

        panel.style.display = "none";
        overlay.style.display = "none";

      } else {

        panel.style.display = "block";
        overlay.style.display = "block";
      }
    }

    function setVolume(value) {
      volume = value;
    }
	
	function replayNote() {
      if (currentNote !== "") {
        playNote(currentNote);
      }
    }
	
    function setNotation(type, button) {

      notation = type;

      const keys = document.querySelectorAll("[data-note]");

      keys.forEach(key => {

        const index = Number(key.dataset.note);

        key.textContent = noteLabels[type][index];
      });

      document.querySelectorAll(".notation-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");
    }
	
	function setDuration(value) {
      noteDuration = value;
    }
	
    function setReference(value, button) {

      playReferenceC = value;

      document.querySelectorAll(".reference-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");
    }
	
	function setSound(type, button) {

      soundType = type;

      document.querySelectorAll(".sound-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");
    }
  </script>
</body>
</html>
